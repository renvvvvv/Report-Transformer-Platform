# 此文件由平台API动态生成和管理

# Service: pdu-nginx-test
location /reports/pdu-nginx-test/ {
    proxy_pass http://platform-api:15001/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /reports/pdu-nginx-test;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}




# Service: report-6f8f231f
location /reports/交流列头柜三相不平衡度分析/ {
    proxy_pass http://platform-api:15002/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /reports/交流列头柜三相不平衡度分析;
    
